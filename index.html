<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odoo AI Assistant — ERP Agent</title>
  <meta name="description" content="AI-powered ERP assistant for Senior Accountants. Chat in Arabic or English to query your Odoo instance." />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Prop-Types (required by Recharts UMD) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <!-- Recharts CDN -->
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <!-- SheetJS CDN -->
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            noto: ['Noto Sans Arabic', 'sans-serif'],
          },
          colors: {
            odoo: {
              bgPrimary: '#1a1a2e',      /* main background */
              bgSecondary: '#16213e',    /* sidebar background */
              bgCard: '#0f3460',         /* cards & panels */
              bgHover: '#533483',        /* hover states */
              purple: '#875a7b',         /* Odoo signature purple */
              purpleLight: '#a06090',    /* lighter purple accent */
              textPrimary: '#ffffff',    /* main text */
              textSecondary: '#c0c0c0',  /* secondary text */
              textMuted: '#888888',      /* muted/placeholder */
              border: '#2d2d4e',         /* borders & dividers */
              success: '#00a09d',        /* teal/success (Odoo green) */
              warning: '#f0ad4e',        /* warning amber */
              danger: '#e74c3c',         /* danger red */
              info: '#3498db',           /* info blue */
            }
          }
        }
      }
    }

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Noto Sans Arabic', sans-serif; background: #1a1a2e; color: #ffffff; overflow: hidden; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #875a7b; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a06090; }

    /* Odoo cards & panels */
    .odoo-card, .glass-card {
      background: #0f3460;
      border: 1px solid #2d2d4e;
    }
    .odoo-card-light, .glass-card-light {
      background: #16213e;
      border: 1px solid #2d2d4e;
    }

    /* Pulse dot animation */
    .pulse-dot {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Message animations */
    .msg-enter {
      animation: msgSlideIn 0.3s ease-out;
    }
    @keyframes msgSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Typing animation */
    .typing-dot {
      animation: typingBounce 1.4s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Sidebar menu items */
    .sidebar-item {
      transition: all 0.2s ease;
    }
    .sidebar-item:hover {
      background: #533483;
    }
    .sidebar-item.active {
      background: rgba(135, 90, 123, 0.2);
      border-left: 3px solid #875a7b;
    }

    /* Stats card hover (Odoo style) */
    .stat-card {
      transition: all 0.2s ease;
      border-left: 4px solid #875a7b;
    }
    .stat-card:hover {
      transform: scale(1.02);
      background: #133b68 !important;
      box-shadow: 0 0 15px rgba(135, 90, 123, 0.35);
    }

    /* Table styling */
    .data-table th {
      background: #2d2d4e;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .data-table tr:hover td {
      background: rgba(135, 90, 123, 0.1);
    }
    .data-table tbody tr {
      animation: trFadeIn 0.25s ease-out both;
    }
    .data-table tbody tr:nth-child(1) { animation-delay: 0.03s; }
    .data-table tbody tr:nth-child(2) { animation-delay: 0.06s; }
    .data-table tbody tr:nth-child(3) { animation-delay: 0.09s; }
    .data-table tbody tr:nth-child(4) { animation-delay: 0.12s; }
    .data-table tbody tr:nth-child(5) { animation-delay: 0.15s; }
    .data-table tbody tr:nth-child(n+6) { animation-delay: 0.18s; }

    @keyframes trFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* RTL support */
    [dir="rtl"] { font-family: 'Noto Sans Arabic', 'Inter', sans-serif; }
    [dir="rtl"] .sidebar-item.active { border-left: none; border-right: 3px solid #875a7b; }

    /* Fade in */
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Shimmer loading */
    .shimmer {
      background: linear-gradient(90deg, rgba(22,33,62,0.4) 25%, rgba(22,33,62,0.8) 50%, rgba(22,33,62,0.4) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Input focus glow */
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(135, 90, 123, 0.5);
    }

    @media print {
      body { background: #1a1a2e !important; color: #ffffff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      aside, header, button, select, input, label, form, .no-print { display: none !important; }
      main { padding: 0 !important; margin: 0 !important; background: #1a1a2e !important; width: 100% !important; max-width: 100% !important; overflow: visible !important; }
      .odoo-card, .odoo-card-light { background: #0f3460 !important; color: #ffffff !important; border: 1px solid #2d2d4e !important; page-break-inside: avoid; }
      .recharts-responsive-container { width: 100% !important; height: 300px !important; }
      h1, h2, h3 { color: white !important; }
    }
  </style>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;
    const {
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
      PieChart, Pie, Cell, LineChart, Line, Legend, Area, AreaChart
    } = Recharts;

    // ─── Global Export Helpers ───────────────────────────────────────────
    function exportToExcel(data, reportTitle) {
      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Report");
      const safeTitle = reportTitle.replace(/[\/\\:*?"<>|]/g, "").replace(/\s+/g, "-");
      XLSX.writeFile(wb, `Odoo-Report-${safeTitle}-${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function exportToCSV(data, reportTitle) {
      const headers = Object.keys(data[0]).join(",");
      const rows = data.map(row => Object.values(row).map(val => 
        `"${String(val ?? "").replace(/"/g, '""')}"`).join(",")).join("\n");
      const blob = new Blob(["\uFEFF" + headers + "\n" + rows], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const safeTitle = reportTitle.replace(/[\/\\:*?"<>|]/g, "").replace(/\s+/g, "-");
      a.download = `Odoo-Report-${safeTitle}-${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportDashboardExcel(salesData, invoicesData, customersData, productsData, kpiSummary) {
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(salesData), "Sales Orders");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(invoicesData), "Invoices");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(customersData), "Top Customers");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(productsData), "Products");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(kpiSummary), "Dashboard Summary");
      XLSX.writeFile(wb, `Odoo-Dashboard-${new Date().toISOString().slice(0,10)}.xlsx`);
    }


    // =========================================================================
    // CORS NOTE:
    // Since this runs from a browser calling a different domain (Odoo server),
    // the Odoo instance MUST allow CORS from this app's origin, OR a small
    // proxy/server-side route is needed to forward requests (to avoid CORS and
    // keep credentials off the client).
    //
    // All Odoo calls go through callOdoo() so it's easy to swap to a
    // server-side proxy later. If CORS blocks calls, the real error is shown
    // in the UI — no mock data fallback.
    // =========================================================================

    // ─── Odoo Configuration ──────────────────────────────────────────────
    // Load config from localStorage, or return default settings
    function loadConnectionSettings() {
      const saved = localStorage.getItem('odoo_connection_settings');
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch (e) {
          console.error('Error parsing saved connection settings', e);
        }
      }
      // No saved credentials — return empty defaults so the login form shows
      return {
        url: '',
        login: '',
        password: '',
        db: '', // empty means auto-detect
        anthropicApiKey: '', // empty means local regex fallback
      };
    }

    // Derive a short company name from the Odoo URL for display
    function getCompanyName() {
      try {
        const u = new URL(currentConfig.url);
        const host = u.hostname.split('.')[0];
        // Convert kebab-case to title case, strip trailing hash IDs
        return host
          .replace(/-last-test-acc-\w+$/i, '')
          .replace(/-/g, ' ')
          .replace(/\b\w/g, c => c.toUpperCase()) || 'Odoo ERP';
      } catch {
        return 'Odoo ERP';
      }
    }

    function saveConnectionSettings(settings) {
      localStorage.setItem('odoo_connection_settings', JSON.stringify(settings));
    }

    // Global connection settings reference
    let currentConfig = loadConnectionSettings();
    const PROXY_URL = 'http://localhost:3001';

    // ─── Odoo Connector Service ──────────────────────────────────────────
    let sessionInfo = { uid: null, sessionId: null, userName: '', db: '' };
    let useProxy = false; // set to true if local proxy is reachable

    // Probe the local CORS proxy on startup
    async function detectProxy() {
      try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 1500);
        await fetch(PROXY_URL + '/web/session/check', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Odoo-Target-Url': currentConfig.url
          },
          body: '{"jsonrpc":"2.0","method":"call","params":{}}',
          signal: ctrl.signal,
        });
        clearTimeout(timer);
        useProxy = true;
        console.log('[OdooConnector] ✓ Local CORS proxy detected at ' + PROXY_URL);
      } catch {
        useProxy = false;
        console.log('[OdooConnector] No local proxy — will call Odoo directly (needs CORS)');
      }
    }

    async function callOdoo(endpoint, payload) {
      const baseUrl = useProxy ? PROXY_URL : currentConfig.url;
      const headers = { 'Content-Type': 'application/json' };
      if (useProxy) {
        headers['X-Odoo-Target-Url'] = currentConfig.url;
      }
      const res = await fetch(`${baseUrl}${endpoint}`, {
        method: 'POST',
        headers: headers,
        credentials: useProxy ? 'omit' : 'include', // proxy handles cookies
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (data.error) {
        const msg = data.error.data?.message || data.error.message || JSON.stringify(data.error);
        throw new Error(msg);
      }
      return data.result;
    }

    async function authenticate(totpCode = null) {
      await detectProxy(); // check if local CORS proxy is running

      // Step 1: Discover database name automatically if not specified
      let dbList = [];
      if (currentConfig.db) {
        dbList = [currentConfig.db];
      } else {
        // Derive from URL subdomain as candidate
        let subdomain = '';
        try {
          const u = new URL(currentConfig.url);
          const parts = u.hostname.split('.');
          if (parts.length > 2) subdomain = parts[0];
        } catch {}
        dbList = subdomain ? [subdomain] : [];
      }

      try {
        const dbResult = await callOdoo('/web/database/list', {
          jsonrpc: '2.0', method: 'call', id: 0, params: {},
        });
        if (Array.isArray(dbResult) && dbResult.length > 0) {
          dbList = [...new Set([...dbResult, ...dbList])];
          console.log('[OdooConnector] Discovered databases:', dbResult);
        }
      } catch (e) {
        console.warn('[OdooConnector] Could not fetch db list, using candidates:', e.message);
      }

      // Step 2: Try standard JSON-RPC auth first (works if no TOTP)
      let lastError = null;
      let detectedDb = dbList.find(d => d) || dbList[0]; // first non-empty
      for (const db of dbList) {
        if (!db) continue;
        detectedDb = db;
        try {
          const result = await callOdoo('/web/session/authenticate', {
            jsonrpc: '2.0', method: 'call', id: 1,
            params: { db, login: currentConfig.login, password: currentConfig.password },
          });
          if (result && result.uid) {
            sessionInfo = {
              uid: result.uid,
              sessionId: result.session_id || '',
              userName: result.name || result.username || currentConfig.login,
              db: db || result.db || 'auto',
            };
            console.log('[OdooConnector] ✓ Authenticated (no TOTP) as', sessionInfo.userName);
            return { success: true, ...sessionInfo };
          }
          // uid null — probably TOTP
          lastError = new Error('TOTP_LIKELY');
          break; // credentials matched right DB
        } catch (e) {
          lastError = e;
          if (e.message.includes('not found') || e.message.includes('database')) continue;
        }
      }

      // Step 3: If proxy is available and we suspect TOTP, use the web login flow
      if (useProxy) {
        console.log('[OdooConnector] Trying TOTP web login via proxy...');
        try {
          const payload = {
            odoo_url: currentConfig.url,
            db: detectedDb,
            login: currentConfig.login,
            password: currentConfig.password,
          };
          if (totpCode) payload.totp_code = totpCode;

          const res = await fetch(`${PROXY_URL}/proxy/login-totp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await res.json();

          // Check if TOTP is required (no code was given)
          if (data.result && data.result.totp_required) {
            return { success: false, totp_required: true, message: data.result.message };
          }

          // Check for auth error
          if (data.error) {
            throw new Error(data.error.message || 'TOTP login failed');
          }

          // Check for successful session
          if (data.result && data.result.uid) {
            sessionInfo = {
              uid: data.result.uid,
              sessionId: data.result.session_id || '',
              userName: data.result.name || data.result.username || currentConfig.login,
              db: detectedDb,
            };
            console.log('[OdooConnector] ✓ Authenticated via TOTP as', sessionInfo.userName);
            return { success: true, ...sessionInfo };
          }

          if (!totpCode) {
            return { success: false, totp_required: true, message: 'Two-Factor Authentication detected. Please enter your 6-digit code.' };
          }

          throw new Error('Authentication failed after TOTP. Check your code and try again.');
        } catch (e) {
          if (e.message.includes('TOTP') || (e.message && !e.message.includes('fetch'))) throw e;
          lastError = e;
        }
      }

      throw new Error(
        lastError?.message || 'Authentication failed'
      );
    }

    async function odooCallKw(model, method, args = [], kwargs = {}) {
      return callOdoo('/web/dataset/call_kw', {
        jsonrpc: '2.0',
        method: 'call',
        id: 2,
        params: { model, method, args, kwargs },
      });
    }

    async function searchRecords(model, domain = [], fields = [], limit = 80, order = '') {
      return odooCallKw(model, 'search_read', [domain], { fields, limit, order });
    }

    async function fetchAllRecords(model, domain = [], fields = [], order = '') {
      let allRecords = [];
      let offset = 0;
      const pageSize = 100;
      
      while (true) {
        const batch = await odooCallKw(model, 'search_read', [domain], {
          fields: fields,
          limit: pageSize,
          offset: offset,
          order: order
        });
        
        allRecords = [...allRecords, ...batch];
        if (batch.length < pageSize) break; // no more records
        offset += pageSize;
      }
      
      return allRecords;
    }

    async function createRecord(model, values) {
      return odooCallKw(model, 'create', [values]);
    }

    async function updateRecord(model, ids, values) {
      return odooCallKw(model, 'write', [ids, values]);
    }

    async function readGroup(model, domain, fields, groupby) {
      return odooCallKw(model, 'read_group', [domain, fields, groupby]);
    }

    // ─── Query Interpreter (Arabic + English) ───────────────────────────
    function interpretQuery(text) {
      const t = text.toLowerCase().trim();

      // ── Sales invoices / فواتير المبيعات ──
      if (/فواتير.*مبيعات|فواتير البيع|sales?\s*invoic/i.test(text)) {
        return {
          model: 'account.move',
          domain: [['move_type', '=', 'out_invoice']],
          fields: ['name', 'partner_id', 'invoice_date', 'amount_total', 'payment_state', 'state'],
          label: 'Sales Invoices / فواتير المبيعات',
        };
      }
      // ── Purchase invoices / فواتير المشتريات ──
      if (/فواتير.*مشتريات|فواتير الشراء|purchase\s*invoic/i.test(text)) {
        return {
          model: 'account.move',
          domain: [['move_type', '=', 'in_invoice']],
          fields: ['name', 'partner_id', 'invoice_date', 'amount_total', 'payment_state', 'state'],
          label: 'Purchase Invoices / فواتير المشتريات',
        };
      }
      // ── Unpaid invoices / الفواتير اللي لسه متدفعتش ──
      if (/متدفع|غير مدفوع|unpaid|not\s*paid|لسه|مش مدفوع/i.test(text)) {
        return {
          model: 'account.move',
          domain: [['move_type', 'in', ['out_invoice', 'in_invoice']], ['payment_state', '!=', 'paid'], ['state', '=', 'posted']],
          fields: ['name', 'partner_id', 'invoice_date', 'amount_total', 'payment_state', 'state', 'move_type'],
          label: 'Unpaid Invoices / فواتير غير مدفوعة',
        };
      }
      // ── All invoices / كل الفواتير ──
      if (/فواتير|invoic/i.test(text)) {
        return {
          model: 'account.move',
          domain: [['move_type', 'in', ['out_invoice', 'in_invoice']]],
          fields: ['name', 'partner_id', 'invoice_date', 'amount_total', 'payment_state', 'state', 'move_type'],
          label: 'All Invoices / كل الفواتير',
        };
      }
      // ── Top customers / أكبر عملاء ──
      if (/أكبر.*عم[لي]|top.*customer|best.*customer/i.test(text)) {
        const match = text.match(/(\d+)/);
        const limit = match ? parseInt(match[1]) : 10;
        return {
          model: 'res.partner',
          domain: [['customer_rank', '>', 0]],
          fields: ['name', 'email', 'phone', 'customer_rank'],
          limit,
          order: 'customer_rank desc',
          label: `Top ${limit} Customers / أكبر ${limit} عملاء`,
        };
      }
      // ── Customers / العملاء ──
      if (/عملاء|عميل|customer/i.test(text)) {
        return {
          model: 'res.partner',
          domain: [['customer_rank', '>', 0]],
          fields: ['name', 'email', 'phone', 'customer_rank'],
          label: 'Customers / العملاء',
        };
      }
      // ── Vendors / الموردين ──
      if (/مورد|موردين|vendor|supplier/i.test(text)) {
        return {
          model: 'res.partner',
          domain: [['supplier_rank', '>', 0]],
          fields: ['name', 'email', 'phone', 'supplier_rank'],
          label: 'Vendors / الموردين',
        };
      }
      // ── This month's sales / مبيعات الشهر ──
      if (/مبيعات.*شهر|مبيعات.*الشهر|sales?\s*this\s*month|this\s*month.*sales?|monthly\s*sales/i.test(text)) {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const start = `${y}-${m}-01`;
        const endD = new Date(y, now.getMonth() + 1, 0);
        const end = `${y}-${m}-${String(endD.getDate()).padStart(2, '0')}`;
        return {
          model: 'sale.order',
          domain: [['date_order', '>=', start], ['date_order', '<=', end], ['state', '=', 'sale']],
          fields: ['name', 'partner_id', 'date_order', 'amount_total', 'state'],
          label: `Sales This Month (${y}-${m}) / مبيعات الشهر`,
        };
      }
      // ── Sales orders / أوامر البيع ──
      if (/مبيعات|بيع|sale|order/i.test(text)) {
        return {
          model: 'sale.order',
          domain: [],
          fields: ['name', 'partner_id', 'date_order', 'amount_total', 'state'],
          label: 'Sales Orders / أوامر البيع',
        };
      }
      // ── Products / المنتجات ──
      if (/منتج|منتجات|product/i.test(text)) {
        return {
          model: 'product.product',
          domain: [],
          fields: ['name', 'list_price', 'qty_available'],
          label: 'Products / المنتجات',
        };
      }
      // ── Purchase orders / أوامر الشراء ──
      if (/أوامر.*شراء|امر.*شراء|purchase.*order/i.test(text)) {
        return {
          model: 'purchase.order',
          domain: [['state', 'in', ['purchase', 'done']]],
          fields: ['name', 'partner_id', 'date_order', 'amount_total', 'state'],
          label: 'Purchase Orders / أوامر الشراء',
        };
      }
      // ── Stock value / قيمة المخزون ──
      if (/قيمة.*مخزون|مخزون|stock|inventory/i.test(text)) {
        return {
          model: 'product.product',
          domain: [['qty_available', '>', 0]],
          fields: ['name', 'qty_available', 'standard_price', 'list_price'],
          label: 'Products In Stock / المنتجات في المخزن',
        };
      }
      // ── Overdue invoices / الفواتير المتأخرة ──
      if (/مستحقة|متأخر|overdue/i.test(text)) {
        const todayStr = new Date().toISOString().slice(0, 10);
        return {
          model: 'account.move',
          domain: [
            ['move_type', '=', 'out_invoice'],
            ['state', '=', 'posted'],
            ['payment_state', '!=', 'paid'],
            ['invoice_date_due', '<', todayStr]
          ],
          fields: ['name', 'partner_id', 'invoice_date', 'invoice_date_due', 'amount_total', 'payment_state'],
          label: 'Overdue Invoices / الفواتير المتأخرة',
        };
      }
      // ── Journal entries / قيود يومية ──
      if (/قيود|journal\s*entr/i.test(text)) {
        return {
          model: 'account.move',
          domain: [['move_type', '=', 'entry']],
          fields: ['name', 'date', 'amount_total', 'state'],
          label: 'Journal Entries / القيود اليومية',
        };
      }
      // ── POS sales today ──
      if (/كاشير.*يوم|تقرير.*pos.*يوم|pos\s*sales?\s*today|cashier\s*sales?\s*today/i.test(text)) {
        const todayStr = new Date().toISOString().slice(0, 10);
        return {
          model: 'pos.order',
          domain: [['state', 'in', ['paid', 'done', 'invoiced']], ['date_order', '>=', `${todayStr} 00:00:00`]],
          fields: ['name', 'date_order', 'amount_total', 'partner_id', 'state', 'session_id', 'pos_reference'],
          label: 'POS Sales Today / تقرير مبيعات الكاشير اليومي',
        };
      }
      // ── POS sales this week ──
      if (/كاشير.*أسبوع|تقرير.*pos.*أسبوع|pos\s*sales?\s*this\s*week|cashier\s*sales?\s*this\s*week/i.test(text)) {
        const now = new Date();
        const day = now.getDay();
        const diff = now.getDate() - day + (day === 0 ? -6 : 1);
        const startOfWeek = new Date(now.setDate(diff));
        startOfWeek.setHours(0,0,0,0);
        const startStr = startOfWeek.toISOString().slice(0, 10) + ' 00:00:00';
        return {
          model: 'pos.order',
          domain: [['state', 'in', ['paid', 'done', 'invoiced']], ['date_order', '>=', startStr]],
          fields: ['name', 'date_order', 'amount_total', 'partner_id', 'state', 'session_id', 'pos_reference'],
          label: 'POS Sales This Week / مبيعات الكاشير الأسبوع ده',
        };
      }
      // ── POS sales this month ──
      if (/تقرير.*pos.*شهر|كاشير.*شهر|pos\s*sales?\s*this\s*month|cashier\s*sales?\s*this\s*month/i.test(text)) {
        const now = new Date();
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const startStr = startOfMonth.toISOString().slice(0, 10) + ' 00:00:00';
        return {
          model: 'pos.order',
          domain: [['state', 'in', ['paid', 'done', 'invoiced']], ['date_order', '>=', startStr]],
          fields: ['name', 'date_order', 'amount_total', 'partner_id', 'state', 'session_id', 'pos_reference'],
          label: 'POS Sales This Month / تقرير مبيعات الكاشير الشهر ده',
        };
      }
      // ── POS sales this quarter ──
      if (/كاشير.*ربع|تقرير.*pos.*ربع|pos\s*sales?\s*this\s*quarter|cashier\s*sales?\s*this\s*quarter/i.test(text)) {
        const now = new Date();
        const q = Math.floor(now.getMonth() / 3);
        const startOfQuarter = new Date(now.getFullYear(), q * 3, 1);
        const startStr = startOfQuarter.toISOString().slice(0, 10) + ' 00:00:00';
        return {
          model: 'pos.order',
          domain: [['state', 'in', ['paid', 'done', 'invoiced']], ['date_order', '>=', startStr]],
          fields: ['name', 'date_order', 'amount_total', 'partner_id', 'state', 'session_id', 'pos_reference'],
          label: 'POS Sales This Quarter / مبيعات الكاشير للربع الحالي',
        };
      }
      // ── Fallback ──
      return null;
    }

    // ─── Data Table Component ────────────────────────────────────────────
    function DataTable({ data, title, rtl, modelName, currency }) {
      const [sortCol, setSortCol] = useState(null);
      const [sortAsc, setSortAsc] = useState(true);

      if (!data || data.length === 0) return null;

      const columns = Object.keys(data[0]).filter(k => k !== 'id' && !k.startsWith('__'));

      const sorted = useMemo(() => {
        if (!sortCol) return data;
        return [...data].sort((a, b) => {
          let va = a[sortCol], vb = b[sortCol];
          if (Array.isArray(va)) va = va[1] || va[0];
          if (Array.isArray(vb)) vb = vb[1] || vb[0];
          if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
          va = String(va || ''); vb = String(vb || '');
          return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
        });
      }, [data, sortCol, sortAsc]);

      const handleSort = (col) => {
        if (sortCol === col) setSortAsc(!sortAsc);
        else { setSortCol(col); setSortAsc(true); }
      };

      const formatValue = (v, col) => {
        if (v === null || v === undefined || v === false) return '—';
        if (Array.isArray(v)) return v[1] || v[0] || '—';
        if (typeof v === 'number') {
          const isAmt = col && (col.includes('amount') || col.includes('price') || col.includes('value') || col.includes('total'));
          if (isAmt && currency === 'USD') {
            return (v / 50).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
          }
          if (isAmt) {
            return `${v.toLocaleString(undefined, { minimumFractionDigits: 2 })} EGP`;
          }
          return v.toLocaleString();
        }
        return String(v);
      };

      const formatHeader = (h) => {
        return h.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      };

      const cleanDataForExport = (rawArray) => {
        return rawArray.map(row => {
          const newRow = {};
          Object.entries(row).forEach(([key, val]) => {
            if (key === 'id' || key.startsWith('__')) return;
            if (Array.isArray(val)) {
              newRow[key] = val[1] || val[0] || '';
            } else if (val === null || val === undefined || val === false) {
              newRow[key] = '';
            } else {
              newRow[key] = val;
            }
          });
          return newRow;
        });
      };

      const getFilenamePrefix = () => {
        if (!modelName) return 'Report';
        if (modelName === 'sale.order') return 'SalesOrders';
        if (modelName === 'account.move') return 'Invoices';
        if (modelName === 'res.partner') return 'Customers';
        if (modelName === 'product.product') return 'Products';
        if (modelName === 'purchase.order') return 'PurchaseOrders';
        if (modelName === 'pos.order') return 'POS-Orders';
        return modelName.replace(/\./g, '_');
      };

      const handleExportExcel = () => {
        const cleanData = cleanDataForExport(data);
        const reportTitle = title || getFilenamePrefix();
        exportToExcel(cleanData, reportTitle);
      };

      const handleExportCSV = () => {
        const cleanData = cleanDataForExport(data);
        const reportTitle = title || getFilenamePrefix();
        exportToCSV(cleanData, reportTitle);
      };

      return (
        <div className="mt-3 rounded-xl overflow-hidden border border-odoo-border" dir={rtl ? 'rtl' : 'ltr'}>
          {title && (
            <div className="px-4 py-2.5 bg-odoo-bgSecondary border-b border-odoo-border flex items-center justify-between">
              <div>
                <span className="text-sm font-semibold text-odoo-purpleLight">{title}</span>
                <span className="text-xs text-odoo-textSecondary ml-3">({data.length} records)</span>
              </div>
            </div>
          )}
          <div className="overflow-x-auto max-h-80 overflow-y-auto">
            <table className="data-table w-full text-sm">
              <thead>
                <tr>
                  {columns.map(col => (
                    <th
                      key={col}
                      onClick={() => handleSort(col)}
                      className="px-4 py-2.5 text-left rtl:text-right text-xs font-semibold text-odoo-textSecondary uppercase tracking-wider cursor-pointer hover:text-white transition-colors select-none whitespace-nowrap"
                    >
                      {formatHeader(col)}
                      {sortCol === col && (
                        <span className="ml-1 text-odoo-purpleLight">{sortAsc ? '↑' : '↓'}</span>
                      )}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody className="divide-y divide-odoo-border">
                {sorted.map((row, i) => (
                  <tr key={row.id || i} className={`${i % 2 === 0 ? 'bg-[#16213e]' : 'bg-[#0f3460]'} transition-colors`}>
                    {columns.map(col => (
                      <td key={col} className="px-4 py-2 text-white whitespace-nowrap">
                        {col === 'payment_state' || col === 'state' ? (
                          <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold border ${
                            String(row[col]).toLowerCase() === 'draft' ? 'bg-[#2d2d4e]/40 text-[#c0c0c0] border-[#2d2d4e]' :
                            ['sale', 'confirmed', 'done'].includes(String(row[col]).toLowerCase()) ? 'bg-[#00a09d]/20 text-[#00a09d] border-[#00a09d]/40' :
                            String(row[col]).toLowerCase() === 'posted' ? 'bg-[#3498db]/20 text-[#3498db] border-[#3498db]/40' :
                            String(row[col]).toLowerCase() === 'paid' ? 'bg-[#00a09d]/25 text-[#00a09d] border-[#00a09d]/40' :
                            String(row[col]).toLowerCase() === 'not_paid' ? 'bg-[#e74c3c]/20 text-[#e74c3c] border-[#e74c3c]/40' :
                            ['cancel', 'cancelled'].includes(String(row[col]).toLowerCase()) ? 'bg-[#7a1c1c]/25 text-[#e74c3c] border-[#e74c3c]/40' :
                            'bg-[#16213e] text-[#c0c0c0] border-[#2d2d4e]'
                          }`}>
                            {formatValue(row[col], col)}
                          </span>
                        ) : col && (col.includes('amount') || col.includes('price') || col.includes('value') || col.includes('total')) ? (
                          <span className="font-mono text-odoo-warning font-semibold">{formatValue(row[col], col)}</span>
                        ) : (
                          formatValue(row[col], col)
                        )}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="flex justify-end gap-2 p-2 bg-odoo-bgSecondary border-t border-odoo-border no-print">
            <button
              onClick={handleExportExcel}
              className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-odoo-purple text-odoo-purple hover:bg-odoo-purple hover:text-white text-xs font-semibold transition-all duration-200 hover:scale-[1.02]"
            >
              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
              </svg>
              Export Excel (.xlsx)
            </button>
            <button
              onClick={handleExportCSV}
              className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-odoo-purpleLight text-odoo-purpleLight hover:bg-odoo-purpleLight hover:text-white text-xs font-semibold transition-all duration-200 hover:scale-[1.02]"
            >
              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h7a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
              </svg>
              Export CSV (.csv)
            </button>
          </div>
        </div>
      );
    }

    // ─── Dashboard Component ─────────────────────────────────────────────
    function Dashboard({ connected, onTriggerChat, currency, setCurrency }) {
      const [stats, setStats] = useState({
        salesCount: null, salesTotal: null,
        unpaidCount: null, unpaidTotal: null,
        customerCount: null, productCount: null,
        purchaseCount: null, purchaseTotal: null,
        stockValue: null,
        overdueCount: null, overdueTotal: null
      });
      const [topCustomers, setTopCustomers] = useState([]);
      const [recentInvoices, setRecentInvoices] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      // Pre-fetched raw datasets for Excel export
      const [rawSales, setRawSales] = useState([]);
      const [rawInvoices, setRawInvoices] = useState([]);
      const [rawCustomers, setRawCustomers] = useState([]);
      const [rawProducts, setRawProducts] = useState([]);
      const [dashboardDataLoading, setDashboardDataLoading] = useState(true);

      // Customization Panel States
      const [datePreset, setDatePreset] = useState('This Month');
      const getInitDates = () => {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const start = `${y}-${m}-01`;
        const end = `${y}-${m}-${String(new Date(y, now.getMonth() + 1, 0).getDate()).padStart(2, '0')}`;
        return { start, end };
      };
      const initDates = getInitDates();
      const [customStartDate, setCustomStartDate] = useState(initDates.start);
      const [customEndDate, setCustomEndDate] = useState(initDates.end);

      const [visibleCards, setVisibleCards] = useState({
        sales: true,
        invoices: true,
        customers: true,
        products: true
      });
      const [customerChartType, setCustomerChartType] = useState('Bar'); // Bar | Line | Pie | Donut
      const [invoiceChartType, setInvoiceChartType] = useState('Pie'); // Bar | Line | Pie | Donut
      const [addedWidgets, setAddedWidgets] = useState([]); // 'purchase_orders', 'stock_value', 'overdue_invoices'
      const [showAddWidgetDropdown, setShowAddWidgetDropdown] = useState(false);

      // Helper to calculate date range preset
      const calculateDateRange = useCallback((preset, startStr, endStr) => {
        const now = new Date();
        let start = new Date();
        let end = new Date();
        
        switch (preset) {
          case 'This Week': {
            const currentDay = now.getDay();
            const distance = currentDay === 0 ? 6 : currentDay - 1;
            start = new Date(now);
            start.setDate(now.getDate() - distance);
            start.setHours(0,0,0,0);
            
            end = new Date(start);
            end.setDate(start.getDate() + 6);
            end.setHours(23,59,59,999);
            break;
          }
          case 'This Month': {
            start = new Date(now.getFullYear(), now.getMonth(), 1);
            end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            break;
          }
          case 'This Quarter': {
            const quarter = Math.floor(now.getMonth() / 3);
            start = new Date(now.getFullYear(), quarter * 3, 1);
            end = new Date(now.getFullYear(), (quarter + 1) * 3, 0);
            break;
          }
          case 'This Year': {
            start = new Date(now.getFullYear(), 0, 1);
            end = new Date(now.getFullYear(), 12, 0);
            break;
          }
          case 'Custom': {
            start = startStr ? new Date(startStr) : new Date();
            end = endStr ? new Date(endStr) : new Date();
            break;
          }
        }
        
        const formatDate = (d) => {
          const y = d.getFullYear();
          const m = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${y}-${m}-${day}`;
        };
        
        return {
          start: formatDate(start),
          end: formatDate(end)
        };
      }, []);

      const formatCurrencyValue = useCallback((val) => {
        if (val === null || val === undefined) return '...';
        const converted = currency === 'USD' ? val / 50 : val;
        if (currency === 'USD') {
          return converted.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
        }
        return `${converted.toLocaleString(undefined, { minimumFractionDigits: 2 })} EGP`;
      }, [currency]);

      const loadDashboard = useCallback(async () => {
        if (!connected) return;
        setLoading(true);
        setDashboardDataLoading(true);
        setError(null);
        try {
          const range = calculateDateRange(datePreset, customStartDate, customEndDate);
          const monthStart = range.start;
          const monthEnd = range.end;

          // Fetch all 4 core datasets in parallel (and in full via fetchAllRecords)
          const salesPromise = fetchAllRecords('sale.order', [
            ['state', '=', 'sale'],
            ['date_order', '>=', monthStart],
            ['date_order', '<=', monthEnd]
          ], ['name', 'partner_id', 'date_order', 'amount_total', 'state']);

          const invoicesPromise = fetchAllRecords('account.move', [
            ['move_type', 'in', ['out_invoice', 'in_invoice']],
            ['state', '=', 'posted'],
            ['invoice_date', '>=', monthStart],
            ['invoice_date', '<=', monthEnd]
          ], ['name', 'partner_id', 'invoice_date', 'amount_total', 'payment_state', 'state']);

          const customersPromise = fetchAllRecords('res.partner', [
            ['customer_rank', '>', 0]
          ], ['name', 'email', 'customer_rank']);

          const productsPromise = fetchAllRecords('product.product', [], ['name', 'list_price', 'standard_price', 'qty_available']);

          // Fetch unpaid invoices directly as before
          const unpaidPromise = searchRecords('account.move', [
            ['move_type', 'in', ['out_invoice', 'in_invoice']],
            ['payment_state', '!=', 'paid'],
            ['state', '=', 'posted']
          ], ['name', 'amount_total', 'partner_id', 'payment_state'], 200);

          // Optional widgets
          const runPurchase = addedWidgets.includes('purchase_orders');
          const purchasePromise = runPurchase ? searchRecords('purchase.order', [
            ['state', 'in', ['purchase', 'done']],
            ['date_order', '>=', monthStart],
            ['date_order', '<=', monthEnd]
          ], ['amount_total']) : Promise.resolve([]);

          const runOverdue = addedWidgets.includes('overdue_invoices');
          const todayStr = new Date().toISOString().slice(0, 10);
          const overduePromise = runOverdue ? searchRecords('account.move', [
            ['move_type', '=', 'out_invoice'],
            ['state', '=', 'posted'],
            ['payment_state', '!=', 'paid'],
            ['invoice_date_due', '<', todayStr]
          ], ['amount_total']) : Promise.resolve([]);

          const [sales, invoices, customers, products, unpaid, purchase, overdue] = await Promise.all([
            salesPromise, invoicesPromise, customersPromise, productsPromise, unpaidPromise,
            purchasePromise, overduePromise
          ]);

          // Save to raw states for export
          setRawSales(sales);
          setRawInvoices(invoices);
          setRawCustomers(customers);
          setRawProducts(products);

          const isRealName = (name) => {
            if (!name) return false;
            const clean = name.trim();
            return !/^\+?\d+$/.test(clean) && !/^[\d\s\-+]+$/.test(clean);
          };
          const realCustomers = customers.filter(c => isRealName(c.name)).slice(0, 8);

          const poCount = purchase.length;
          const poTotal = purchase.reduce((s, r) => s + (r.amount_total || 0), 0);

          const stValue = products.reduce((s, p) => {
            const qty = p.qty_available || 0;
            const price = p.standard_price || p.list_price || 0;
            return s + (qty * price);
          }, 0);

          const odCount = overdue.length;
          const odTotal = overdue.reduce((s, r) => s + (r.amount_total || 0), 0);

          setStats({
            salesCount: sales.length,
            salesTotal: sales.reduce((s, r) => s + (r.amount_total || 0), 0),
            unpaidCount: unpaid.length,
            unpaidTotal: unpaid.reduce((s, r) => s + (r.amount_total || 0), 0),
            customerCount: customers.filter(c => isRealName(c.name)).length,
            productCount: products.length,
            purchaseCount: poCount,
            purchaseTotal: poTotal,
            stockValue: stValue,
            overdueCount: odCount,
            overdueTotal: odTotal
          });

          setTopCustomers(realCustomers);
          
          // Sort and slice invoices for dashboard table
          const sortedInvoices = [...invoices].sort((a, b) => {
            return new Date(b.invoice_date || 0) - new Date(a.invoice_date || 0);
          }).slice(0, 10);
          setRecentInvoices(sortedInvoices);

          setDashboardDataLoading(false);
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      }, [connected, datePreset, customStartDate, customEndDate, addedWidgets, calculateDateRange]);

      useEffect(() => { loadDashboard(); }, [loadDashboard]);

      const cleanDataForExport = (rawArray) => {
        const isUsd = currency === 'USD';
        return rawArray.map(row => {
          const newRow = {};
          Object.entries(row).forEach(([key, val]) => {
            if (key === 'id' || key.startsWith('__')) return;
            let formattedVal = val;
            if (Array.isArray(val)) {
              formattedVal = val[1] || val[0] || '';
            } else if (val === null || val === undefined || val === false) {
              formattedVal = '';
            } else {
              formattedVal = val;
            }
            if (typeof formattedVal === 'number' && isUsd) {
              const isAmt = key && (key.includes('amount') || key.includes('price') || key.includes('value') || key.includes('total'));
              if (isAmt) {
                formattedVal = formattedVal / 50;
              }
            }
            newRow[key] = formattedVal;
          });
          return newRow;
        });
      };

      const handleDashboardExcelClick = () => {
        if (dashboardDataLoading || !rawSales || !rawInvoices || !rawCustomers || !rawProducts) return;

        const range = calculateDateRange(datePreset, customStartDate, customEndDate);
        const monthStart = range.start;
        const monthEnd = range.end;

        const salesData = cleanDataForExport(rawSales);
        const invoicesData = cleanDataForExport(rawInvoices);

        const partnerSales = {};
        rawSales.forEach(order => {
          if (order.partner_id) {
            const pId = Array.isArray(order.partner_id) ? order.partner_id[0] : order.partner_id;
            if (!partnerSales[pId]) {
              partnerSales[pId] = { totalSales: 0, orderCount: 0 };
            }
            partnerSales[pId].totalSales += order.amount_total || 0;
            partnerSales[pId].orderCount += 1;
          }
        });

        const isRealName = (name) => {
          if (!name) return false;
          const clean = name.trim();
          return !/^\+?\d+$/.test(clean) && !/^[\d\s\-+]+$/.test(clean);
        };

        const isUsd = currency === 'USD';
        const rate = isUsd ? 50 : 1;
        const curSuffix = isUsd ? 'USD' : 'EGP';

        const customersData = rawCustomers
          .filter(c => isRealName(c.name))
          .map(c => {
            const partnerStats = partnerSales[c.id] || { totalSales: 0, orderCount: 0 };
            return {
              Name: c.name,
              Email: c.email || '',
              Rank: c.customer_rank || 0,
              [`Total Confirmed Sales (${curSuffix})`]: partnerStats.totalSales / rate,
              'Sales Order Count': partnerStats.orderCount
            };
          });

        const productsData = rawProducts.map(p => ({
          Name: p.name,
          [`Sale Price (${curSuffix})`]: (p.list_price || 0) / rate,
          [`Cost Price (${curSuffix})`]: (p.standard_price || 0) / rate,
          'Quantity Available': p.qty_available || 0,
          [`Stock Value (${curSuffix})`]: ((p.qty_available || 0) * (p.standard_price || p.list_price || 0)) / rate
        }));

        const kpiSummary = [
          { 'Metric Name': 'Date Range Start', 'Value': monthStart },
          { 'Metric Name': 'Date Range End', 'Value': monthEnd },
          { 'Metric Name': 'Total Sales Count', 'Value': stats.salesCount },
          { 'Metric Name': `Total Sales Amount (${currency})`, 'Value': currency === 'USD' ? stats.salesTotal / 50 : stats.salesTotal },
          { 'Metric Name': 'Unpaid Invoices Count', 'Value': stats.unpaidCount },
          { 'Metric Name': `Unpaid Invoices Amount (${currency})`, 'Value': currency === 'USD' ? stats.unpaidTotal / 50 : stats.unpaidTotal },
          { 'Metric Name': 'Active Customers Count', 'Value': stats.customerCount },
          { 'Metric Name': 'Total Products Count', 'Value': stats.productCount },
        ];
        if (addedWidgets.includes('purchase_orders')) {
          kpiSummary.push({ 'Metric Name': 'Purchase Orders Count', 'Value': stats.purchaseCount });
          kpiSummary.push({ 'Metric Name': `Purchase Orders Total (${currency})`, 'Value': currency === 'USD' ? stats.purchaseTotal / 50 : stats.purchaseTotal });
        }
        if (addedWidgets.includes('stock_value')) {
          kpiSummary.push({ 'Metric Name': `Stock Value (${currency})`, 'Value': currency === 'USD' ? stats.stockValue / 50 : stats.stockValue });
        }
        if (addedWidgets.includes('overdue_invoices')) {
          kpiSummary.push({ 'Metric Name': 'Overdue Invoices Count', 'Value': stats.overdueCount });
          kpiSummary.push({ 'Metric Name': `Overdue Invoices Total (${currency})`, 'Value': currency === 'USD' ? stats.overdueTotal / 50 : stats.overdueTotal });
        }

        exportDashboardExcel(salesData, invoicesData, customersData, productsData, kpiSummary);
      };


      const COLORS = ['#875a7b', '#00a09d', '#3498db', '#f0ad4e', '#e74c3c', '#a06090', '#533483', '#2d2d4e'];

      const renderCustomerChart = () => {

      if (!connected) {

      return (
        <div className="flex-1 overflow-y-auto p-6 fade-in">

            <div>
              <h1 className="text-2xl font-bold text-white">Dashboard</h1>

            <div className="flex items-center gap-3 no-print">

                <button

                  className={`px-3 py-1 rounded-md text-xs font-semibold transition-all ${currency === 'EGP' ? 'bg-odoo-purple text-white shadow' : 'text-odoo-textSecondary hover:text-white'}`}

                >
                  USD

            {/* Add Widget Dropdown */}
            <div className="relative">
              <button
                onClick={() => setShowAddWidgetDropdown(!showAddWidgetDropdown)}
                className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-odoo-purple text-odoo-purpleLight hover:bg-odoo-purple hover:text-white text-xs font-semibold transition-all hover:scale-[1.02]"
              >
                <span>+ Add Widget</span>
              </button>
              {showAddWidgetDropdown && (
                <div className="absolute right-0 mt-2 w-56 rounded-lg bg-[#16213e] border border-odoo-border p-3 shadow-xl z-30">
                  <div className="text-xs font-semibold text-odoo-textSecondary mb-2 uppercase tracking-wider border-b border-odoo-border pb-1">Select KPI Widgets</div>
                  <div className="space-y-2 text-xs text-white">
                    {[
                      { id: 'purchase_orders', label: 'Total Purchase Orders' },
                      { id: 'stock_value', label: 'Stock Value' },
                      { id: 'overdue_invoices', label: 'Overdue Invoices' }
                    ].map(widget => {

                              } else {

                            className="rounded border-odoo-border bg-odoo-bgPrimary text-odoo-purple focus:ring-0 cursor-pointer"

                  icon={<svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z"/></svg>}

                  value={loading ? '...' : stats.unpaidCount}
                  subtitle={loading ? '' : `Total: ${formatCurrencyValue(stats.unpaidTotal)}`}
                  icon={<svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>}

    function formatOdooDateTime(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      const ss = String(date.getSeconds()).padStart(2, '0');
      return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
    }

    const groupPosData = (orders, period, customStart, customEnd) => {
      const groups = {};

      const getSubPeriodLabel = (dateStr) => {
        const cleanedStr = dateStr.replace(' ', 'T');
        const d = new Date(cleanedStr);
        if (isNaN(d.getTime())) return 'Other';

        if (period === 'Day') {
          const hr = String(d.getHours()).padStart(2, '0');
          return `${hr}:00`;
        } else if (period === 'Week') {
          const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
          return days[d.getDay()];
        } else if (period === 'Month') {
          return String(d.getDate());
        } else if (period === 'Quarter' || period === 'Year') {
          const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
          return months[d.getMonth()];
        } else {
          // Custom
          const s = new Date(customStart);
          const e = new Date(customEnd);
          const diffTime = Math.abs(e - s);
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          if (diffDays <= 2) {
            const hr = String(d.getHours()).padStart(2, '0');
            return `${hr}:00`;
          } else if (diffDays <= 45) {
            return `${d.getMonth() + 1}/${d.getDate()}`;
          } else {
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return months[d.getMonth()];
          }
        }
      };

      // Initialize groups for correct ordering
      if (period === 'Day') {
        for (let i = 0; i < 24; i++) {
          groups[`${String(i).padStart(2, '0')}:00`] = 0;
        }
      } else if (period === 'Week') {
        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        days.forEach(day => { groups[day] = 0; });
      } else if (period === 'Quarter') {
        const now = new Date();
        const q = Math.floor(now.getMonth() / 3);
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        for (let i = q * 3; i < (q + 1) * 3; i++) {
          groups[months[i]] = 0;
        }
      } else if (period === 'Year') {
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        months.forEach(m => { groups[m] = 0; });
      }

      orders.forEach(order => {
        const label = getSubPeriodLabel(order.date_order);
        groups[label] = (groups[label] || 0) + (order.amount_total || 0);
      });

      return Object.entries(groups).map(([label, amount]) => ({
        label,
        amount,
      }));
    };

    // ─── POS Reports Component ───────────────────────────────────────────
    function PosReports({ connected, currency }) {
      const [period, setPeriod] = useState('Month');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [orders, setOrders] = useState([]);
      
      const getInitDates = () => {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const start = `${y}-${m}-01`;
        const end = `${y}-${m}-${String(new Date(y, now.getMonth() + 1, 0).getDate()).padStart(2, '0')}`;
        return { start, end };
      };
      const initDates = getInitDates();
      const [startDate, setStartDate] = useState(initDates.start);
      const [endDate, setEndDate] = useState(initDates.end);

      const loadReports = useCallback(async () => {
        if (!connected) return;
        setLoading(true);
        setError(null);
        try {
          const now = new Date();
          let start = new Date();
          let end = new Date();
          let isCustom = false;

          switch (period) {
            case 'Day': {
              start.setHours(0,0,0,0);
              end = new Date(start);
              end.setDate(start.getDate() + 1);
              break;
            }
            case 'Week': {
              const day = now.getDay();
              const diff = now.getDate() - day + (day === 0 ? -6 : 1);
              start = new Date(now.setDate(diff));
              start.setHours(0,0,0,0);
              end = new Date(start);
              end.setDate(start.getDate() + 7);
              break;
            }
            case 'Month': {
              start = new Date(now.getFullYear(), now.getMonth(), 1);
              end = new Date(now.getFullYear(), now.getMonth() + 1, 1);
              break;
            }
            case 'Quarter': {
              const q = Math.floor(now.getMonth() / 3);
              start = new Date(now.getFullYear(), q * 3, 1);
              end = new Date(now.getFullYear(), (q + 1) * 3, 1);
              break;
            }
            case 'Year': {
              start = new Date(now.getFullYear(), 0, 1);
              end = new Date(now.getFullYear() + 1, 0, 1);
              break;
            }
            case 'Custom': {
              isCustom = true;
              break;
            }
          }

          let domain = [['state', 'in', ['paid', 'done', 'invoiced']]];
          if (isCustom) {
            domain.push(['date_order', '>=', `${startDate} 00:00:00`]);
            domain.push(['date_order', '<=', `${endDate} 23:59:59`]);
          } else {
            domain.push(['date_order', '>=', formatOdooDateTime(start)]);
            domain.push(['date_order', '<', formatOdooDateTime(end)]);
          }

          const fields = ['name', 'date_order', 'amount_total', 'partner_id', 'state', 'session_id', 'pos_reference'];
          const data = await fetchAllRecords('pos.order', domain, fields, 'date_order desc');
          setOrders(data);
        } catch (e) {
          setError(e.message);
        }
        setLoading(false);
      }, [connected, period, startDate, endDate]);

      useEffect(() => {
        loadReports();
      }, [loadReports]);

      // Calculate totals
      const totalAmount = orders.reduce((sum, o) => sum + (o.amount_total || 0), 0);
      const orderCount = orders.length;
      const averageValue = orderCount > 0 ? totalAmount / orderCount : 0;

      const formatValue = (v) => {
        const converted = currency === 'USD' ? v / 50 : v;
        if (currency === 'USD') {
          return converted.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
        }
        return `${converted.toLocaleString(undefined, { minimumFractionDigits: 2 })} EGP`;
      };

      const chartData = useMemo(() => {
        return groupPosData(orders, period, startDate, endDate);
      }, [orders, period, startDate, endDate]);

      return (
        <div className="flex-1 overflow-y-auto p-6 fade-in">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <h1 className="text-2xl font-bold text-white">POS Cashier Reports</h1>
              <p className="text-sm text-odoo-textSecondary mt-1">Live point of sale analytics</p>
            </div>
            <button onClick={loadReports} className="flex items-center gap-2 px-4 py-2 rounded-xl border border-odoo-border bg-odoo-bgSecondary text-odoo-textSecondary hover:text-white hover:scale-[1.02] active:scale-95 transition-all text-sm">
