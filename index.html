    // ─── Chat Interface ──────────────────────────────────────────────────
    function ChatInterface({ connected, settings, pendingChatQuery, clearPendingChatQuery, currency, onRtlChange }) {
      const [messages, setMessages] = useState([
        {
          role: 'bot',
          text: 'مرحباً! أنا مساعد أودو الذكي 🤖\n\nI can query your Odoo ERP in Arabic or English. Try:\n\n• "اعرض فواتير المبيعات"\n• "الفواتير اللي لسه متدفعتش"\n• "أكبر 5 عملاء"\n• "مبيعات الشهر ده"\n• "Show all products"\n• "Unpaid invoices"',
          data: null,
          rtl: false,
        },
      ]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const scrollRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [messages, isTyping]);

      const executeQuery = async (textToSubmit) => {
        if (!textToSubmit) return;

        const rtl = isArabic(textToSubmit);
        setMessages(prev => [...prev, { role: 'user', text: textToSubmit, rtl }]);
        setIsTyping(true);

        if (!connected) {
          setIsTyping(false);
          setMessages(prev => [...prev, {
            role: 'bot',
            text: '⚠️ Not connected to Odoo. Please wait for the connection to establish or check the Connection tab.',
            rtl: false,
          }]);
          return;
        }

        let parsedQuery = null;
        let botText = '';
        let queryData = null;
        let tableTitle = '';
        const apiKey = settings?.anthropicApiKey || '';

        if (apiKey) {
          try {
            const response = await fetch(`${PROXY_URL}/proxy/anthropic/v1/messages`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 100000,
                system: "You are an ERP accounting assistant connected to Odoo. Parse the user's request and return a JSON object with: {model, domain, fields, action, summary, order, limit}. If it is an Odoo search query, set action to 'query' and specify model, domain list, fields list, and optionally order string and limit number. If it is a greeting or general statement, set model to null, action to 'chat', and put your friendly conversational response in 'summary'. Always respond in the same language as the user (Arabic or English). Return ONLY the raw JSON string.",
                messages: [{ role: 'user', content: textToSubmit }]
              })
            });
            const data = await response.json();
            if (data.content && data.content[0]) {
              const reply = data.content[0].text;
              const cleanText = reply.replace(/```json|```/g, '').trim();
              parsedQuery = JSON.parse(cleanText);
            } else if (data.error) {
              throw new Error(data.error.message || 'Anthropic API error');
            }
          } catch (e) {
            console.error('LLM Parsing failed, falling back to pattern matching:', e);
          }
        }

        // Fallback to local pattern matching if LLM was not used or failed
        if (!parsedQuery) {
          const matched = interpretQuery(textToSubmit);
          if (matched) {
            parsedQuery = {
              model: matched.model,
              domain: matched.domain,
              fields: matched.fields,
              action: 'query',
              summary: matched.label,
              limit: matched.limit,
              order: matched.order
            };
          }
        }

        if (!parsedQuery) {
          setIsTyping(false);
          setMessages(prev => [...prev, {
            role: 'bot',
            text: rtl
              ? '🤔 مش فاهم الطلب ده. جرب حاجة زي:\n• "اعرض الفواتير"\n• "العملاء"\n• "المنتجات"\n• "مبيعات الشهر"\n• "فواتير غير مدفوعة"'
              : '🤔 I didn\'t understand that request. Try:\n• "Show invoices"\n• "Unpaid invoices"\n• "Top 5 customers"\n• "Sales this month"\n• "Products"',
            rtl,
          }]);
          return;
        }

        try {
          if (parsedQuery.model && parsedQuery.action !== 'chat') {
            const results = parsedQuery.limit
              ? await searchRecords(parsedQuery.model, parsedQuery.domain, parsedQuery.fields, parsedQuery.limit, parsedQuery.order || '')
              : await fetchAllRecords(parsedQuery.model, parsedQuery.domain, parsedQuery.fields, parsedQuery.order || '');

            const count = results.length;
            botText = parsedQuery.summary || (rtl
              ? `✅ تم العثور على ${count} سجل في ${parsedQuery.model}`
              : `✅ Found ${count} records in ${parsedQuery.model}`);
            queryData = count > 0 ? results : null;
            tableTitle = parsedQuery.summary || parsedQuery.model;
          } else {
            botText = parsedQuery.summary || (rtl ? 'مرحباً!' : 'Hello!');
          }

          setIsTyping(false);
          setMessages(prev => [...prev, {
            role: 'bot',
            text: botText,
            data: queryData,
            tableTitle: tableTitle,
            modelName: parsedQuery ? parsedQuery.model : null,
            rtl,
          }]);
        } catch (e) {
          setIsTyping(false);
          setMessages(prev => [...prev, {
            role: 'bot',
            text: `❌ Error: ${e.message}`,
            rtl: false,
          }]);
        }
      };

      const handleSend = () => {
        const text = input.trim();
        if (!text) return;
        setInput('');
        executeQuery(text);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      };

      useEffect(() => {
        if (pendingChatQuery) {
          setInput(pendingChatQuery);
          executeQuery(pendingChatQuery);
          clearPendingChatQuery();
        }
      }, [pendingChatQuery, clearPendingChatQuery]);

      // Auto-detect RTL if any messages or current input is Arabic
      useEffect(() => {
        if (onRtlChange) {
          if (input && isArabic(input)) {
            onRtlChange(true);
          } else {
            const hasArabic = messages.some(msg => msg.rtl || isArabic(msg.text));
            onRtlChange(hasArabic);
          }
        }
      }, [input, messages, onRtlChange]);

      const suggestions = [
        'اعرض فواتير المبيعات',
        'الفواتير الغير مدفوعة',
        'أكبر 5 عملاء',
        'المنتجات',
        'Sales this month',
      ];

      return (
        <div className="flex-1 flex flex-col overflow-hidden bg-odoo-bgPrimary">
          {/* Chat messages */}
          <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4">
            {messages.map((msg, i) => (
              <div key={i} className={`msg-enter flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`} dir={msg.rtl ? 'rtl' : 'ltr'}>
                <div className={`flex gap-3 max-w-[85%] ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                  {/* Avatar */}
                  <div className={`flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center ${
                    msg.role === 'user'
                      ? 'bg-odoo-purple text-white shadow'
                      : 'bg-odoo-bgSecondary border border-odoo-border text-odoo-purple'
                  }`}>
                    {msg.role === 'user' ? Icons.user : Icons.bot}
                  </div>

                  {/* Message bubble */}
                  <div className={`px-4 py-3 ${
                    msg.role === 'user'
                      ? 'bg-odoo-purple text-white rounded-2xl border border-odoo-purpleLight/20 shadow-md'
                      : `bg-[#0f3460] text-white rounded-xl ${msg.rtl ? 'border-r-4 border-r-odoo-purple border-y border-l border-odoo-border shadow-sm' : 'border-l-4 border-l-odoo-purple border-y border-r border-odoo-border shadow-sm'}`
                  }`}>
                    <p className="text-sm whitespace-pre-wrap leading-relaxed">
                      {msg.text}
                    </p>
                    {msg.data && <DataTable data={msg.data} title={msg.tableTitle} rtl={msg.rtl} modelName={msg.modelName} currency={currency} />}
                  </div>
                </div>
              </div>
            ))}

            {/* Typing indicator */}
            {isTyping && (
              <div className="flex justify-start msg-enter">
                <div className="flex gap-3">
                  <div className="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center bg-odoo-bgSecondary border border-odoo-border text-odoo-purple">
                    {Icons.bot}
                  </div>
                  <div className="bg-[#0f3460] border-l-4 border-l-odoo-purple border-y border-r border-odoo-border rounded-xl px-5 py-4 flex items-center gap-1.5 shadow-sm">
                    <div className="typing-dot w-2 h-2 rounded-full bg-odoo-purple" />
                    <div className="typing-dot w-2 h-2 rounded-full bg-odoo-purple" />
                    <div className="typing-dot w-2 h-2 rounded-full bg-odoo-purple" />
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Quick suggestions */}
          <div className="px-4 py-2.5 flex gap-2 overflow-x-auto bg-[#17172c] border-t border-odoo-border">
            {suggestions.map((s, i) => (
              <button
                key={i}
                onClick={() => { setInput(s); inputRef.current?.focus(); }}
                className="flex-shrink-0 px-3.5 py-1.5 rounded-full text-xs border border-odoo-purple text-odoo-purpleLight hover:bg-odoo-purple hover:text-white transition-all whitespace-nowrap select-none font-semibold hover:scale-[1.02]"
              >
                {s}
              </button>
            ))}
          </div>

          {/* Input area */}
          <div className="p-4 border-t border-odoo-border bg-odoo-bgSecondary">
            <div className="flex gap-3 items-end">
              <div className="flex-1 relative">
                <textarea
                  ref={inputRef}
                  id="chat-input"
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyDown={handleKeyDown}
                  placeholder="اكتب سؤالك... / Type your question..."
                  rows={1}
                  dir={isArabic(input) ? 'rtl' : 'ltr'}
                  className="w-full resize-none rounded-xl px-4 py-3 bg-[#16213e] border border-odoo-border text-white placeholder-odoo-textMuted focus:outline-none input-glow transition-all text-sm"
                />
              </div>
              <button
                onClick={handleSend}
                disabled={!input.trim()}
                id="send-button"
                className="flex-shrink-0 w-11 h-11 rounded-xl bg-odoo-purple flex items-center justify-center text-white hover:bg-odoo-purpleLight transition-all duration-200 hover:scale-[1.02] disabled:opacity-35 disabled:hover:scale-100 disabled:bg-[#2d2d4e]"
              >
                {Icons.send}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Main App ────────────────────────────────────────────────────────
    function App() {
      const [settings, setSettings] = useState(loadConnectionSettings());
      const hasCredentials = settings.url && settings.login && settings.password;
      const [activeTab, setActiveTab] = useState(hasCredentials ? 'chat' : 'connection');
      const [connStatus, setConnStatus] = useState(hasCredentials ? 'connecting' : 'disconnected'); // connecting | connected | error | totp | disconnected
      const [connError, setConnError] = useState(null);
      const [sessionData, setSessionData] = useState(null);
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [totpCode, setTotpCode] = useState('');
      const [totpSubmitting, setTotpSubmitting] = useState(false);
      const totpInputRef = useRef(null);

      // Add state for clickable cards passing queries to Chat
      const [pendingChatQuery, setPendingChatQuery] = useState(null);
      const [currency, setCurrency] = useState('EGP'); // EGP | USD
      const [isRtl, setIsRtl] = useState(false);

      const handleTriggerChatQuery = (queryText) => {
        setPendingChatQuery(queryText);
        setActiveTab('chat');
      };

      const connect = useCallback(async (code = null) => {
        setConnStatus(code ? 'connecting' : 'connecting');
        setConnError(null);
        try {
          const result = await authenticate(code);
          if (result.totp_required) {
            setConnStatus('totp');
            setConnError(result.message);
            setTimeout(() => totpInputRef.current?.focus(), 200);
            return;
          }
          setSessionData(result);
          setConnStatus('connected');
        } catch (e) {
          setConnError(e.message);
          setConnStatus('error');
        }
      }, []);

      const handleTotpSubmit = useCallback(async () => {
        if (!totpCode.trim() || totpCode.length < 6) return;
        setTotpSubmitting(true);
        try {
          const result = await authenticate(totpCode.trim());
          if (result.totp_required) {
            setConnError('Invalid code. Please try again.');
            setTotpCode('');
            setTotpSubmitting(false);
            return;
          }
          if (result.success) {
            setSessionData(result);
            setConnStatus('connected');
            setTotpCode('');
          } else {
            setConnError('Authentication failed. Check code.');
          }
        } catch (e) {
          setConnError(e.message);
          setTotpCode('');
        }
        setTotpSubmitting(false);
      }, [totpCode]);

      useEffect(() => {
        // Only auto-connect if we have saved credentials
        if (settings.url && settings.login && settings.password) {
          connect();
        }
      }, []);

      const tabs = [
        { id: 'chat', label: 'Chat', labelAr: 'المحادثة', icon: Icons.chat },
        { id: 'dashboard', label: 'Dashboard', labelAr: 'لوحة التحكم', icon: Icons.dashboard },
        { id: 'pos_reports', label: 'POS Reports', labelAr: 'تقارير الكاشير POS', icon: Icons.pos },
        { id: 'connection', label: 'Connection', labelAr: 'الاتصال', icon: Icons.connection },
      ];

      return (
        <div className="h-screen w-screen flex overflow-hidden" dir={isRtl ? 'rtl' : 'ltr'}>

          {/* ── TOTP Modal Overlay ───────────────────────────────────── */}
          {connStatus === 'totp' && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm fade-in">
              <div className="odoo-card rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl border border-odoo-border">
                <div className="text-center mb-6">
                  <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-odoo-purple/20 flex items-center justify-center text-odoo-purple">
                    <svg className="w-8 h-8 text-odoo-purpleLight" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                    </svg>
                  </div>
                  <h2 className="text-xl font-bold text-white mb-2">Two-Factor Authentication</h2>
                  <p className="text-sm text-odoo-textSecondary">
                    Enter the 6-digit code from your Authenticator app
                  </p>
                </div>

                {connError && connError !== 'Two-Factor Authentication detected. Please enter your 6-digit code.' && (
                  <div className="mb-4 p-3 rounded-xl bg-odoo-danger/10 border border-odoo-danger/30 text-odoo-danger text-xs text-center">
                    {connError}
                  </div>
                )}

                <div className="mb-6">
                  <input
                    ref={totpInputRef}
                    id="totp-input"
                    type="text"
                    inputMode="numeric"
                    autoComplete="one-time-code"
                    maxLength={6}
                    value={totpCode}
                    onChange={(e) => setTotpCode(e.target.value.replace(/\D/g, '').slice(0, 6))}
                    onKeyDown={(e) => { if (e.key === 'Enter') handleTotpSubmit(); }}
                    placeholder="000000"
                    className="w-full text-center text-3xl font-mono tracking-[0.5em] px-6 py-4 rounded-2xl bg-[#16213e] border border-odoo-border text-white placeholder-odoo-textMuted focus:outline-none input-glow transition-all"
                  />
                </div>

                <button
                  onClick={handleTotpSubmit}
                  disabled={totpCode.length < 6 || totpSubmitting}
                  id="totp-submit"
                  className="w-full py-3.5 rounded-2xl bg-odoo-purple text-white font-semibold hover:bg-odoo-purpleLight hover:shadow-lg hover:shadow-odoo-purple/25 hover:scale-[1.02] active:scale-95 transition-all disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                >
                  {totpSubmitting ? (
                    <>
                      <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                      Verifying...
                    </>
                  ) : (
                    <>
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                      </svg>
                      Verify & Connect
                    </>
                  )}
                </button>

                <p className="text-center text-xs text-odoo-textMuted mt-4">
                  {getCompanyName()} — {settings.login}
                </p>
              </div>
            </div>
          )}

          {/* ── Sidebar ─────────────────────────────────────────────────── */}
          <aside className={`flex flex-col border-r rtl:border-r-0 rtl:border-l border-odoo-border bg-[#1d1d35] transition-all duration-300 ${sidebarCollapsed ? 'w-16' : 'w-64'}`}>
            {/* Logo area */}
            <div className="p-4 border-b border-odoo-border">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-lg bg-odoo-purple flex items-center justify-center flex-shrink-0">
                  <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
                  </svg>
                </div>
                {!sidebarCollapsed && (
                  <div className="min-w-0">
                    <h1 className="text-sm font-bold text-white truncate">Odoo AI Assistant</h1>
                    <p className="text-[10px] text-odoo-textSecondary truncate">{getCompanyName()}</p>
                  </div>
                )}
              </div>
            </div>

            {/* Navigation */}
            <nav className="flex-1 py-3 px-2 space-y-1">
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  id={`nav-${tab.id}`}
                  onClick={() => setActiveTab(tab.id)}
                  className={`sidebar-item w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all ${
                    activeTab === tab.id
                      ? 'active text-white font-medium'
                      : 'text-odoo-textSecondary hover:text-white'
                  }`}
                >
                  <span className="flex-shrink-0">{tab.icon}</span>
                  {!sidebarCollapsed && <span>{tab.label}</span>}
                </button>
              ))}
            </nav>

            {/* User Profile Info (Odoo Bottom Bar style) */}
            {!sidebarCollapsed && (
              <div className="p-3 border-t border-odoo-border bg-[#17172c] flex items-center gap-2.5">
                <div className="w-8 h-8 rounded-full bg-odoo-purple flex items-center justify-center font-bold text-white uppercase text-xs select-none">
                  {sessionData ? sessionData.userName.substring(0, 2) : '??'}
                </div>
                <div className="min-w-0">
                  <div className="text-xs font-semibold text-white truncate">{sessionData ? sessionData.userName : (settings.login || 'Not connected')}</div>
                  <div className="text-[9px] text-odoo-textSecondary truncate">Senior Accountant</div>
                </div>
              </div>
            )}

            {/* Collapse toggle */}
            <button
              onClick={() => setSidebarCollapsed(!sidebarCollapsed)}
              className="p-3 border-t border-odoo-border text-odoo-textSecondary hover:text-white transition-colors flex items-center justify-center"
            >
              <svg className={`w-4 h-4 transition-transform ${sidebarCollapsed ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
              </svg>
            </button>
          </aside>

          {/* ── Main Content ────────────────────────────────────────────── */}
          <main className="flex-1 flex flex-col overflow-hidden bg-odoo-bgPrimary">
            {/* Top bar */}
            <header className="flex items-center justify-between px-6 py-3 border-b border-odoo-border bg-odoo-bgSecondary no-print">
              {/* Breadcrumbs */}
              <div className="flex items-center gap-2 text-sm text-odoo-textSecondary">
                <span className="font-semibold text-white">{getCompanyName()}</span>
                <span className="text-odoo-border">/</span>
                <span className="text-odoo-purple font-semibold capitalize">{activeTab === 'chat' ? 'AI Chat' : activeTab === 'pos_reports' ? 'POS Reports' : activeTab}</span>
              </div>
              
              {/* Right side connection info and user profile */}
              <div className="flex items-center gap-4">
                {/* Live Status Badge */}
                <div className="flex items-center gap-2 px-2.5 py-1 bg-odoo-bgPrimary rounded-lg border border-odoo-border text-xs">
                  <div className={`w-2 h-2 rounded-full ${connStatus === 'connected' ? 'bg-odoo-success pulse-dot' : 'bg-odoo-danger'}`} />
                  <span className="text-white font-medium capitalize">{connStatus === 'connected' ? 'Live' : 'Offline'}</span>
                </div>

                {/* User Dropdown Preview */}
                <div className="flex items-center gap-2 px-2.5 py-1 hover:bg-odoo-bgHover rounded-lg transition-all cursor-pointer select-none text-xs">
                  <div className="w-5 h-5 rounded-full bg-odoo-purple flex items-center justify-center font-bold text-white uppercase text-[10px]">
                    {sessionData ? sessionData.userName.substring(0, 2) : '??'}
                  </div>
                  <span className="text-odoo-textSecondary font-semibold">{sessionData ? sessionData.userName : (settings.login || 'Guest')}</span>
                  <svg className="w-3 h-3 text-odoo-textSecondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
                  </svg>
                </div>
              </div>
            </header>

            {/* Tab content */}
            {activeTab === 'chat' && (
              <ChatInterface
                connected={connStatus === 'connected'}
                settings={settings}
                pendingChatQuery={pendingChatQuery}
                clearPendingChatQuery={() => setPendingChatQuery(null)}
                currency={currency}
                onRtlChange={setIsRtl}
              />
            )}
            {activeTab === 'dashboard' && (
              <Dashboard
                connected={connStatus === 'connected'}
                onTriggerChat={handleTriggerChatQuery}
                currency={currency}
                setCurrency={setCurrency}
              />
            )}
            {activeTab === 'pos_reports' && (
              <PosReports
                connected={connStatus === 'connected'}
                currency={currency}
              />
            )}
            {activeTab === 'connection' && (
              <ConnectionPage
                status={connStatus}
                error={connError}
                sessionData={sessionData}
                onRetry={() => connect()}
                settings={settings}
                onSaveSettings={(newSettings) => {
                  setSettings(newSettings);
                  currentConfig = newSettings;
                  saveConnectionSettings(newSettings);
                  connect();
                }}
                onResetSettings={() => {
                  // Disconnect: clear all saved credentials
                  localStorage.removeItem('odoo_connection_settings');
                  const emptySettings = {
                    url: '',
                    login: '',
                    password: '',
                    db: '',
                    anthropicApiKey: '',
                  };
                  setSettings(emptySettings);
                  currentConfig = emptySettings;
                  setSessionData(null);
                  setConnStatus('disconnected');
                  setConnError(null);
                  setActiveTab('connection');
                }}
              />
            )}
          </main>
        </div>
      );
    }

    // ─── Mount ───────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
